name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Android/Filmatube/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'Android/Filmatube/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/Filmatube
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # google-services.json is git-ignored. Store its base64 in the
      # GOOGLE_SERVICES_JSON repo secret:
      #   base64 -w0 app/google-services.json   (Linux)
      #   [Convert]::ToBase64String([IO.File]::ReadAllBytes("app/google-services.json"))  (PowerShell)
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug
        run: ./gradlew assembleDebug --stacktrace
