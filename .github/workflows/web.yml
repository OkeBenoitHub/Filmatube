name: Web CI

on:
  push:
    branches: [ main ]
    paths:
      - 'WebApp/Filmatube/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'WebApp/Filmatube/**'
      - '.github/workflows/web.yml'

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WebApp/Filmatube
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: WebApp/Filmatube/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
