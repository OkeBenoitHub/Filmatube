# Firebase App Hosting config for the Filmatube Next.js app.
# Deploy: `firebase apphosting:backends:create` (once) then push to the connected branch,
# or `firebase deploy`. Secrets are set with `firebase apphosting:secrets:set` and referenced below.
runConfig:
  minInstances: 0
  maxInstances: 2
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # Public (safe to expose) — Firebase web config + site URL + VAPID key.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    secret: NEXT_PUBLIC_FIREBASE_VAPID_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    secret: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    availability: [BUILD, RUNTIME]
  # No custom domain yet — the backend's free hosted.app URL. Swap when a domain is attached.
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://filmatube--filmatubelive.europe-west4.hosted.app
    availability: [BUILD, RUNTIME]

  # Server-only secrets — admin SDK + R2. Never exposed to the client.
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability: [RUNTIME]
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
    availability: [RUNTIME]
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
    availability: [RUNTIME]
  - variable: R2_ACCOUNT_ID
    secret: R2_ACCOUNT_ID
    availability: [RUNTIME]
  - variable: R2_ACCESS_KEY_ID
    secret: R2_ACCESS_KEY_ID
    availability: [RUNTIME]
  - variable: R2_SECRET_ACCESS_KEY
    secret: R2_SECRET_ACCESS_KEY
    availability: [RUNTIME]
  - variable: TMDB_API_KEY
    secret: TMDB_API_KEY
    availability: [RUNTIME]

  # R2 buckets + public base URLs — names/URLs aren't sensitive, but the presign +
  # playback code fails without them (kept as secrets alongside the keys for one workflow).
  - variable: R2_BUCKET_VIDEOS
    secret: R2_BUCKET_VIDEOS
    availability: [RUNTIME]
  - variable: R2_BUCKET_IMAGES
    secret: R2_BUCKET_IMAGES
    availability: [RUNTIME]
  - variable: R2_BUCKET_AVATARS
    secret: R2_BUCKET_AVATARS
    availability: [RUNTIME]
  - variable: R2_BUCKET_SUBTITLES
    secret: R2_BUCKET_SUBTITLES
    availability: [RUNTIME]
  - variable: R2_PUBLIC_URL_IMAGES
    secret: R2_PUBLIC_URL_IMAGES
    availability: [RUNTIME]
  - variable: R2_PUBLIC_URL_AVATARS
    secret: R2_PUBLIC_URL_AVATARS
    availability: [RUNTIME]
  - variable: R2_PUBLIC_URL_SUBTITLES
    secret: R2_PUBLIC_URL_SUBTITLES
    availability: [RUNTIME]
